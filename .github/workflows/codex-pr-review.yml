name: Codex PR Review

on:
  workflow_run:
    workflows: ["Claude PR Review"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    name: Codex · Segunda revisión de cambios
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Resolver número de PR
        id: pr
        run: |
          PR_NUMBER=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")
          if [ -z "$PR_NUMBER" ]; then
            echo "No hay PR asociada al workflow_run."
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.pr.outputs.has_pr == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Recopilar contexto de la PR
        if: steps.pr.outputs.has_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER='${{ steps.pr.outputs.number }}'

          git fetch origin main --depth=1

          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title -q '.title')
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q '.body // "Sin descripción"')
          COMMITS=$(git log origin/main..HEAD --pretty=format:"- %h %s%n  %b" --no-merges)
          FILES_CHANGED=$(git diff --name-status origin/main...HEAD)
          DIFF=$(git diff origin/main...HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock' | head -c 12000)

          {
            echo "PR_TITLE<<EOF"
            echo "$PR_TITLE"
            echo "EOF"
            echo "PR_BODY<<EOF"
            echo "$PR_BODY"
            echo "EOF"
            echo "COMMITS<<EOF"
            echo "$COMMITS"
            echo "EOF"
            echo "FILES_CHANGED<<EOF"
            echo "$FILES_CHANGED"
            echo "EOF"
            echo "DIFF<<EOF"
            echo "$DIFF"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Codex · Auditar revisión de Claude y PR
        if: steps.pr.outputs.has_pr == 'true'
        uses: openai/codex-action@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Eres el segundo revisor técnico. Claude ya revisó esta PR en un workflow previo.
            Tu tarea es validar que la PR está alineada al scope y detectar omisiones que un primer revisor podría haber pasado por alto.

            ## PR: ${{ env.PR_TITLE }}

            ### Descripción de la tarea / backlog
            ${{ env.PR_BODY }}

            ### Commits incluidos
            ${{ env.COMMITS }}

            ### Archivos modificados
            ${{ env.FILES_CHANGED }}

            ### Diff del código
            ```diff
            ${{ env.DIFF }}
            ```

            ---

            Evalúa explícitamente:
            1. Si los cambios implementados corresponden exactamente a la tarea.
            2. Si hay cambios fuera de scope o efectos secundarios.
            3. Qué puntos de riesgo suelen omitirse en una primera revisión (config, scripts, CI, seguridad, regresiones de UI/UX).

            ## Formato de respuesta
            ### ✅ Cambios que corresponden
            ### ⚠️ Cambios no declarados o dudosos
            ### ❌ Discrepancias o riesgos
            ### 📋 Veredicto
            **APROBADO** / **REVISAR** / **BLOQUEADO**

            Sé directo y conciso.
