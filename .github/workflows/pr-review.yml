name: PR Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

# Required repository secrets:
# - OPENAI_API_KEY: for Codex review job
#
# Notes:
# - This workflow only reviews and comments on PRs.
# - It does NOT merge, approve, reject, push, or auto-fix code.
# - Claude review is local-only (run in terminal before merge).

jobs:
  codex_review:
    name: Codex · PR review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build PR context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER='${{ github.event.pull_request.number }}'

          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title -q '.title')
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q '.body // "Sin descripción"')
          COMMITS=$(git log origin/main..HEAD --pretty=format:"- %h %s%n  %b" --no-merges)
          FILES_CHANGED=$(git diff --name-status origin/main...HEAD)
          DIFF=$(git diff origin/main...HEAD -- . \
            ':(exclude)package-lock.json' \
            ':(exclude)yarn.lock' \
            ':(exclude)*.lock' | head -c 15000)

          {
            echo "PR_TITLE<<EOF"
            echo "$PR_TITLE"
            echo "EOF"
            echo "PR_BODY<<EOF"
            echo "$PR_BODY"
            echo "EOF"
            echo "COMMITS<<EOF"
            echo "$COMMITS"
            echo "EOF"
            echo "FILES_CHANGED<<EOF"
            echo "$FILES_CHANGED"
            echo "EOF"
            echo "DIFF<<EOF"
            echo "$DIFF"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Codex analyze
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Eres revisor técnico de PRs para un proyecto Django.

            Objetivo:
            - Verificar que el PR coincide con el diff real.
            - Detectar cambios funcionales no descritos y colaterales.
            - Señalar riesgos evidentes antes de merge.

            Zonas sensibles del repo:
            - templates/**
            - templates/accounts/dashboard.html
            - accounts/**
            - mysite/**
            - scripts/ de merge/push

            Riesgos prioritarios:
            - innerHTML con contenido dinámico
            - querySelector/selectores construidos con input no validado
            - conflictos de merge mal resueltos
            - refactors visuales que rompen funcionalidad
            - mezcla HTML/CSS/JS con cambios no descritos

            PR: ${{ env.PR_TITLE }}

            Descripción:
            ${{ env.PR_BODY }}

            Commits:
            ${{ env.COMMITS }}

            Archivos modificados:
            ${{ env.FILES_CHANGED }}

            Diff:
            ```diff
            ${{ env.DIFF }}
            ```

            Formato de salida obligatorio:
            1) Resumen real del cambio
            2) Coincidencia entre PR y diff
            3) Riesgos detectados
            4) Ajustes sugeridos
            5) Veredicto: OK / AJUSTAR / BLOQUEAR

      - name: Comment in PR (Codex)
        uses: actions/github-script@v7
        env:
          # TODO: verify exact output key exposed by openai/codex-action@v1.
          # If it differs from `response`, this step will publish a fallback message.
          CODEX_REVIEW_TEXT: ${{ steps.codex.outputs.response }}
        with:
          script: |
            const raw = (process.env.CODEX_REVIEW_TEXT || '').trim();
            const body = raw.length > 0
              ? `## Codex Review\n\n${raw}`
              : '## Codex Review\n\nNo se pudo recuperar salida estructurada de la action. Revisa los logs del job.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
