name: Claude Issue Worker

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write
  actions: read

# Required repository secret:
# - CLAUDE_CODE_OAUTH_TOKEN: generated locally with `claude setup-token`
#
# Safe behavior:
# - Never merges, pushes, or closes issues automatically.

jobs:
  claude_issue_worker:
    name: Claude · Work from issue
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request == null

    steps:
      - name: Check OAuth token
        id: cfg
        run: |
          if [ -n "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment missing setup
        if: steps.cfg.outputs.enabled != 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber = context.payload.issue?.number;
            if (!issueNumber) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '## Claude Issue Worker',
                '',
                'Falta el secret `CLAUDE_CODE_OAUTH_TOKEN` en el repositorio.',
                'Genéralo en terminal con `claude setup-token` y añádelo en Settings → Secrets and variables → Actions.',
              ].join('\n'),
            });

      - name: Checkout repository
        if: steps.cfg.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        if: steps.cfg.outputs.enabled == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Run on issue events/comments without requiring "@claude"
          trigger_phrase: ""
          track_progress: true
          prompt: |
            Work on the GitHub issue using the issue body and any new issue comments as instructions.

            Project constraints:
            - This is a Django repository.
            - Follow CLAUDE.md review and safety criteria.
            - Keep changes minimal and focused.
            - If the request is ambiguous, ask one concise clarifying question.

            Safety rules:
            - Do NOT merge.
            - Do NOT push directly to main.
            - Do NOT close issues automatically.
            - If code changes are needed, propose them in a branch/PR flow.
